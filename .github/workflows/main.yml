name: Build Firewall APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04 # Pinaka-stable para sa Buildozer

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Buildozer dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libffi-dev libssl-dev cmake gettext libltdl-dev libgmp-dev libmpc-dev libmpfr-dev
          # Manual install ng Ant para hindi na mag-hang ang Buildozer
          sudo apt install -y ant
          pip install --user --upgrade buildozer cython virtualenv

      - name: Build APK with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # Linisin ang environment para fresh build
          buildozer android clean
          # Force accept licenses
          yes | buildozer android debug || true
          buildozer android debug
        env:
          APP_ANDROID_ACCEPT_SDK_LICENSE: "1"
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Firewall-APK-Final
          path: bin/*.apk
