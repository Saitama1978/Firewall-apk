name: Build APK Ultimate

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git python3-dev ffmpeg libsdl2-dev \
          libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev \
          libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev \
          libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
          libsqlite3-dev sqlite3 bzip2 libbz2-dev libssl-dev openssl libgdbm-dev \
          liblzma-dev libffi-dev uuid-dev libreadline-dev libncurses5-dev \
          libncursesw5-dev libdb5.3-dev libexpat1-dev pkg-config libicu-dev \
          autoconf automake libtool cmake ant zip unzip

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install "Cython<3.0" buildozer
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build APK
        run: |
          # Fresh start para iwas 'Broken pipe'
          rm -rf .buildozer
          buildozer -v android debug