name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk ant python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libffi-dev libssl-dev cmake gettext libltdl-dev libgmp-dev libmpc-dev libmpfr-dev
          pip install --user --upgrade "cython<3.0" buildozer virtualenv

      - name: Build APK with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # Ituro natin sa system kung nasaan ang Ant para hindi na ito mag-download
          export ANT_HOME=/usr/share/ant
          export PATH=$PATH:$ANT_HOME/bin
          
          # Force build at iwas sa FileNotFoundError
          yes | buildozer android debug || true
          buildozer android debug
        env:
          APP_ANDROID_ACCEPT_SDK_LICENSE: "1"
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RAMSaver-Firewall-Final
          path: bin/*.apk
